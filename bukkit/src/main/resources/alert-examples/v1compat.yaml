shorthands:
  tps: "T(java.lang.Math).round(#server.getTPS()[0] * 10.0) / 10.0"
  time: "new java.text.SimpleDateFormat('EEE, d. MMM yyyy HH:mm:ss z').format(T(java.util.Date).from(T(java.time.Instant).now()))"
  date: "new java.text.SimpleDateFormat('EEE, d. MMM yyyy HH:mm:ss z').format(T(java.util.Date).from(T(java.time.Instant).now()))"
  ping: "#player.getPing()"
  name: "#player.getName()"
  username: "#player.getName()"
  displayname: "T(org.bukkit.ChatColor).stripColor(#player.getDisplayName())"
  world: "#player.getWorld().getName()"
  embedavatarurl: "#discordsrv.placeholderService().replacePlaceholders('%player_avatar_url%', #discordsrv.playerProvider().player(#player.getUniqueId()))"
  botavatarurl: "#jda.getSelfUser().getEffectiveAvatarUrl()"
  botname: "#jda.getSelfUser().getEffectiveName()"

